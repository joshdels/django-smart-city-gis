<section>
    <form hx-post="{% url 'send_public_form' %}"
          hx-target="#contact-form"
          hx-swap="outerHTML">
        {% csrf_token %}
        <div>
            <label for="name">Name *</label>
            <br>
            <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <br>
        <div>
            <label for="organization">Organization</label>
            <br>
            <input type="text"
                   id="organization"
                   name="organization"
                   placeholder="Company, Municipality, or Individual">
        </div>
        <br>
        <div>
            <label for="email">Email *</label>
            <br>
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="you@example.com"
                   required>
        </div>
        <br>
        <div>
            <label for="phone">Phone</label>
            <br>
            <input type="tel"
                   id="phone"
                   name="phone"
                   inputmode="numeric"
                   pattern="[0-9]{10}"
                   minlength="10"
                   maxlength="12"
                   placeholder="+63 912 345 6789">
        </div>
        <br>
        <div>
            <label for="inquiry">Inquiry *</label>
            <br>
            <textarea id="inquiry"
                      name="inquiry"
                      rows="6"
                      placeholder="Tell us about your project or how we can help..."
                      required></textarea>
        </div>
        <br>
        <button class="btn-primary" type="submit">Send Inquiry</button>
        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}
    </form>
    <p>TopMap Solutions needs the contact information you provide to us to contact you about our products and services.</p>
</section>
