<section>
    <form action="{% url 'send_public_form' %}" method="post">
        {% csrf_token %}
        <div>
            <label for="name">Name *</label>
            <input type="text"
                   id="name"
                   name="name"
                   placeholder="Your name"
                   value="{{ name }}"
                   autocomplete="name"
                   required>
        </div>
        <div>
            <label for="organization">Organization</label>
            <input type="text"
                   id="organization"
                   name="organization"
                   value="{{ organization }}"
                   autocomplete="organization"
                   placeholder="Company, Municipality, or Individual">
        </div>
        <div>
            <label for="email">Email *</label>
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="you@example.com"
                   autocomplete="email"
                   value="{{ email }}"
                   required>
        </div>
        <div>
            <label for="phone">Phone</label>
            <input type="tel"
                   id="phone"
                   name="phone"
                   minlength="10"
                   maxlength="20"
                   value="{{ phone }}"
                   autocomplete="tel"
                   placeholder="63 912 345 6889">
        </div>
        <div>
            <label for="inquiry">Inquiry *</label>
            <textarea id="inquiry"
                      name="inquiry"
                      rows="6"
                      placeholder="Tell us about your project or how we can help..."
                      required>{{ inquiry }}</textarea>
        </div>
        <button class="btn-primary" type="submit">Send Inquiry</button>
        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}
    </form>
    <p>TopMap Solutions needs the contact information you provide to us to contact you about our products and services.</p>
</section>
