<h2></h2>

{% if error %}
<p>{{ error }}</p>
{% endif %}

<form method="POST">
  {% csrf_token %}

  <label>Upload Boundary (GeoJSON or ZIP)</label>
  <input
    type="file"
    name="boundary_file"
    accept=".geojson, .json, .zip"
    required
  />
  <button type="submit">Upload Boundary</button>
</form>
