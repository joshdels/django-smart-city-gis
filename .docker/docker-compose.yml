services:
  web:
    build:
      context: ../
      dockerfile: .docker/Dockerfile
    container_name: django-smart-city-gis
    env_file:
      - ../.env.prod
    ports:
      - "8006:8000"
    restart: unless-stopped
    networks:
      - gis_centralize_db

networks:
  gis_centralize_db:
    external: true